<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Relational SQL Database Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0f12;
            color: #f0f3f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #38bdf8; }
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #94a3b8;
        }
        textarea {
            flex: 1;
            background-color: #1e293b;
            color: #38bdf8;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: #38bdf8; }
        #output-container {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
        }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background-color: #0369a1; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #334155;
            padding: 10px 12px;
            text-align: left;
        }
        th { background-color: #0f172a; color: #38bdf8; }
        .error { color: #ef4444; font-family: monospace; padding: 5px 0; }
        .success { color: #10b981; font-family: monospace; margin-bottom: 6px; }
    </style>
</head>
<body>

    <h2>Full Relational SQL Engine</h2>
    
    <div class="container">
        <div class="panel">
            <label for="editor">Relational Database Script (SQL):</label>
            <textarea id="editor" spellcheck="false">
-- 1. Create primary master table
CREATE TABLE students (sid PRIMARY KEY, name, branch);

INSERT INTO students VALUES (101, "Alice", "CS");
INSERT INTO students VALUES (102, "Bob", "IT");
INSERT INTO students VALUES (103, "Charlie", "CS");

-- 2. Create secondary reference relational table
CREATE TABLE grades (sid, subject, marks);

INSERT INTO grades VALUES (101, "Data Structures", 95);
INSERT INTO grades VALUES (102, "DBMS", 88);
INSERT INTO grades VALUES (103, "Algorithms", 91);

-- 3. Run a multi-table relational INNER JOIN query match
SELECT students.name, grades.subject, grades.marks 
FROM students 
INNER JOIN grades ON students.sid == grades.sid;
            </textarea>
            <button onclick="runSQLScript()">Execute Relational Engine</button>
        </div>

        <div class="panel">
            <label>Relational Query Output Terminal:</label>
            <div id="output-container"></div>
        </div>
    </div>

    <script>
        class FullSQLDatabase {
            constructor() {
                this.tables = {};
            }

            execute(queryStr) {
                const cleanQuery = queryStr.trim().replace(/\s+/g, ' ');
                const upperQuery = cleanQuery.toUpperCase();
                
                if (upperQuery.startsWith('CREATE TABLE')) return this.handleCreate(cleanQuery);
                if (upperQuery.startsWith('INSERT INTO')) return this.handleInsert(cleanQuery);
                if (upperQuery.startsWith('SELECT')) return this.handleSelect(cleanQuery);
                
                throw new Error(`Syntax Error: Unsupported statement initialization.`);
            }

            handleCreate(query) {
                const match = query.match(/CREATE\s+TABLE\s+(\w+)\s*\((.*)\)/i);
                if (!match) throw new Error("SQL Syntax Error: Invalid CREATE TABLE structure.");
                
                const tableName = match[1].toLowerCase();
                const rawCols = match[2].split(',');
                
                let columns = [];
                let primaryKey = null;

                rawCols.forEach(col => {
                    let parts = col.trim().split(/\s+/);
                    let colName = parts[0].toLowerCase();
                    columns.push(colName);
                    if (parts.length > 1 && parts.slice(1).join(' ').toUpperCase().includes('PRIMARY KEY')) {
                        primaryKey = colName;
                    }
                });

                this.tables[tableName] = { columns, primaryKey, rows: [] };
                return { type: 'MSG', text: `Table "${tableName}" initialized successfully.` };
            }

            handleInsert(query) {
                const match = query.match(/INSERT\s+INTO\s+(\w+)\s+VALUES\s*\((.*)\)/i);
                if (!match) throw new Error("SQL Syntax Error: Invalid INSERT INTO schema pattern.");
                
                const tableName = match[1].toLowerCase();
                if (!(tableName in this.tables)) throw new Error(`Runtime Error: Relation table "${tableName}" does not exist.`);
                
                const table = this.tables[tableName];
                const cleanValues = match[2].split(',').map(v => {
                    let s = v.trim().replace(/['"]/g, '');
                    return isNaN(s) ? s : Number(s);
                });

                if (cleanValues.length !== table.columns.length) {
                    throw new Error(`Data Integrity Error: Column/Value count mismatch for execution.`);
                }

                let newRow = {};
                table.columns.forEach((col, idx) => { newRow[col] = cleanValues[idx]; });

                if (table.primaryKey) {
                    const pkVal = newRow[table.primaryKey];
                    const duplicate = table.rows.some(r => r[table.primaryKey] === pkVal);
                    if (duplicate) throw new Error(`Constraint Error: Duplicate primary key value entry detected for "${table.primaryKey}" (${pkVal}).`);
                }

                table.rows.push(newRow);
                return { type: 'MSG', text: `Row tuple committed to table "${tableName}".` };
            }

            handleSelect(query) {
                const joinMatch = query.match(/SELECT\s+(.+)\s+FROM\s+(\w+)\s+INNER\s+JOIN\s+(\w+)\s+ON\s+(.+)\.(\w+)\s*==\s*(.+)\.(\w+)/i);

                if (joinMatch) {
                    return this.processInnerJoin(joinMatch);
                }

                const simpleMatch = query.match(/SELECT\s+(.+)\s+FROM\s+(\w+)(?:\s+WHERE\s+(.+))?/i);
                if (!simpleMatch) throw new Error("SQL Parsing Exception: Invalid query layout specification.");

                const fields = simpleMatch[1].split(',').map(f => f.trim().toLowerCase());
                const tName = simpleMatch[2].toLowerCase();
                if (!(tName in this.tables)) throw new Error(`Table "${tName}" not found.`);
                
                let resultRows = this.tables[tName].rows.map(row => {
                    let out = {};
                    fields.forEach(f => { out[f] = row[f]; });
                    return out;
                });

                return { type: 'TABLE', headers: fields, rows: resultRows };
            }

            processInnerJoin(match) {
                const fields = match[1].split(',').map(f => f.trim());
                const t1Name = match[2].toLowerCase();
                const t2Name = match[3].toLowerCase();
                
                const table1Key = match[5].toLowerCase();
                const table2Key = match[7].toLowerCase();

                if (!(t1Name in this.tables) || ! (t2Name in this.tables)) {
                    throw new Error("Relational Error: Missing matching join entity targets.");
                }

                const t1 = this.tables[t1Name];
                const t2 = this.tables[t2Name];
                let joinedRows = [];

                t1.rows.forEach(r1 => {
                    t2.rows.forEach(r2 => {
                        if (r1[table1Key] === r2[table2Key]) {
                            let combinedRow = {};
                            Object.keys(r1).forEach(k => combinedRow[`${t1Name}.${k}`] = r1[k]);
                            Object.keys(r2).forEach(k => combinedRow[`${t2Name}.${k}`] = r2[k]);
                            joinedRows.push(combinedRow);
                        }
                    });
                });

                const finalHeaders = fields.map(f => f.toLowerCase());
                const finalRows = joinedRows.map(row => {
                    let out = {};
                    finalHeaders.forEach(f => { out[f] = row[f] || 'NULL'; });
                    return out;
                });

                return { type: 'TABLE', headers: finalHeaders, rows: finalRows };
            }
        }

        function runSQLScript() {
            const container = document.getElementById('output-container');
            container.innerHTML = ""; 

            const lines = document.getElementById('editor').value.split('\n');
            const db = new FullSQLDatabase();
            let currentCmd = "";

            for (let line of lines) {
                let clean = line.replace(/--.*$/, '').trim();
                if (!clean) continue;
                
                currentCmd += " " + clean;
                if (clean.endsWith(';')) {
                    try {
                        const res = db.execute(currentCmd.replace(/;$/, ''));
                        if (res.type === 'MSG') {
                            container.innerHTML += `<div class="success">${res.text}</div>`;
                        } else if (res.type === 'TABLE') {
                            renderTable(container, res.headers, res.rows);
                        }
                    } catch (err) {
                        container.innerHTML += `<div class="error">${err.message}</div>`;
                        return;
                    }
                    currentCmd = "";
                }
            }
        }

        function renderTable(target, headers, rows) {
            if(rows.length === 0) { target.innerHTML += "<div>Empty Result Set</div>"; return; }
            let html = '<table><tr>';
            headers.forEach(h => html += `<th>${h.toUpperCase()}</th>`);
            html += '</tr>';
            rows.forEach(r => {
                html += '<tr>';
                headers.forEach(h => html += `<td>${r[h]}</td>`);
                html += '</tr>';
            });
            html += '</table><br>';
            target.innerHTML += html;
        }
    </script>
</body>
</html>
